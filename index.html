<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="container">
    <h1>🎥 Movie Wishlist</h1>
    
    <div class="input-section">
        <input type="text" id="movie-title" placeholder="Tiêu đề phim (ví dụ: Dune: Part Two)...">
        <textarea id="movie-desc" placeholder="Lý do / Mô tả muốn xem (ví dụ: Phim viễn tưởng đỉnh cao...)"></textarea>
        <div class="actions">
            <button id="save-btn" class="btn-primary">Lưu phim</button>
            <button id="clear-all-btn" class="btn-danger">Xóa tất cả</button>
        </div>
    </div>

    <div id="movie-list" class="movie-grid">
        </div>
    </div>
    <script src="./script.js"></script>
</body>
</html>
